specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Caterpillar
providerId: caterpillar
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Telematics
  - Heavy Equipment
  - Rate Limiting
description: The Cat Digital Marketplace gates API access behind a developer-subscription flow on digital.cat.com.
  Per-second / per-minute limits are not published in the public catalog overview and are surfaced to
  the subscriber once an API product is added to a developer's account. Limits typically vary per API
  product and per Cat Connect / VisionLink subscription class.
notes: Public catalog overview returned 403 to anonymous fetch; numeric limits are gated behind portal
  authentication.
sources:
  - https://digital.cat.com/api-catalog-overview
  - https://digital.cat.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-API product quota / rate
    scope: subscription
    metric: varies
    limit: see Cat Digital portal product page
  - name: Cat Connect / VisionLink platform throughput
    scope: customer-account
    metric: varies
    limit: see Cat Connect customer subscription terms
policies:
  - name: Subscription-scoped limits
    description: Limits are evaluated per Cat Digital subscription. Different API products in the catalog
      apply different per-product limits.
  - name: Backoff
    description: On 429 / 503, retry with exponential backoff and jitter; honor Retry-After when supplied.
  - name: Telemetry cadence
    description: VisionLink-derived data is updated on the platform's collection cadence; polling faster
      than the upstream refresh window wastes quota and adds load without surfacing new data.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
