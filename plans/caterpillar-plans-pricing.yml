specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Caterpillar
providerId: caterpillar
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Construction
  - Heavy Equipment
  - Telematics
  - Manufacturing
  - Mining
description: Caterpillar's Cat Digital Marketplace (digital.cat.com) publishes a catalog of telematics,
  fleet, fuel, and worksite APIs built on Cat Connect / VisionLink. Pricing for individual APIs is not
  publicly listed — developers subscribe through the Cat Digital portal and receive product-specific
  terms. Most APIs are bundled with the underlying Cat Connect / VisionLink subscription that the customer's
  Cat Dealer has already sold.
notes: Cat Digital portal is gated; per-API pricing is not externally visible. Pricing is generally bundled
  into Cat Connect / VisionLink customer subscriptions sold via Cat Dealers.
sources:
  - https://digital.cat.com/
  - https://digital.cat.com/api-catalog-overview
plans:
  - id: caterpillar-cat-digital-marketplace
    name: Cat Digital Marketplace API (Subscriber)
    type: subscription
    description: Subscriber access to the Cat Digital Marketplace API catalog. Subscription typically
      bundled with Cat Connect / VisionLink customer agreement; standalone pricing requires sales engagement
      via the Cat Digital portal or Cat Dealer.
    entries:
      - label: Cat Digital Marketplace subscription
        name: cat_digital_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: bundled with Cat Connect / VisionLink subscription
        userMultiplied: false
      - label: Custom / additional API entitlement
        name: custom_entitlement
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact Cat Dealer
        userMultiplied: false
    elements:
      - name: Asset / fleet telematics APIs
      - name: Fuel + utilization APIs
      - name: Hours / odometer APIs
      - name: Geofencing APIs
      - name: Cat Digital portal credentials
maintainers:
