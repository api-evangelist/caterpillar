specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Caterpillar
providerId: caterpillar
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Telematics
  - Heavy Equipment
  - Manufacturing
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps scaffold for Caterpillar''s Cat Digital Marketplace APIs. The dominant
  invoice line is the customer''s Cat Connect / VisionLink subscription sold through the Cat Dealer
  network; API access is bundled within that. Meters track per-asset and per-API consumption to support
  internal allocation.'
notes: Most spend comes from the upstream Cat Connect / VisionLink subscription; API consumption is bundled.
  Per-call invoicing not externally surfaced.
sources:
  - https://digital.cat.com/
  - https://digital.cat.com/api-catalog-overview
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Caterpillar Inc.
serviceCategory: Equipment Telematics + Fleet Data
billingModel:
  pricingCategory: Subscription (Cat Connect / VisionLink Bundled)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Cat Digital Marketplace API
  ServiceCategory: Equipment Telematics
  ProviderName: Caterpillar
  PublisherName: Caterpillar Inc.
  InvoiceIssuerName: Caterpillar Cat Dealer
  BillingCurrency: USD
meters:
  - name: connected_assets
    unit: asset
    aggregation: count
    dimensions:
      - product_family
      - subscription_class
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api_product
      - subscription
  - name: telematics_records_delivered
    unit: record
    aggregation: sum
    dimensions:
      - api_product
      - asset
  - name: subscription_seats
    unit: seat
    aggregation: count
    dimensions:
      - subscription_class
principles:
  - name: Visibility
    description: Combine Cat Digital portal usage reports with the Cat Connect / VisionLink customer dashboard
      to see assets, subscription class, and API call volume in one view.
  - name: Allocation
    description: Allocate Cat Connect subscription cost to the operating unit / fleet that owns the assets;
      attribute API integration cost to the consuming product team via subscription tag.
  - name: Optimization
    description: Right-size subscription class per asset (Essentials vs. Advanced); avoid polling APIs
      faster than VisionLink's data-refresh cadence; consolidate dealer accounts to reach volume tiers.
  - name: Accountability
    description: Fleet manager owns the Cat Connect subscription cost; integration platform owner reconciles
      API consumption against the negotiated entitlement.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
