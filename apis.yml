      The Cat Digital Marketplace publishes a catalog of Caterpillar APIs
      spanning asset telematics, fleet management, fuel data, utilization,
      hours/odometer, and geofencing. Developers subscribe via the Cat
      Digital portal to receive API credentials and execute calls against
      the Cat Connect and VisionLink platforms.
