description: >-
  Caterpillar Inc. (NYSE: CAT) is the world's leading manufacturer of
  construction and mining equipment, off-highway diesel and natural gas
  engines, industrial gas turbines, and diesel-electric locomotives. Its
  digital arm, Cat Digital, publishes developer APIs through the Cat Digital
  Marketplace (digital.cat.com) covering fleet, asset, fuel, and worksite
  telematics built on top of the Cat Connect and VisionLink data platforms.
